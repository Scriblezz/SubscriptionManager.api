services:
  db:
    image: postgres:16
    container_name: subscriptionmanager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - subscriptionmanager_db_data:/var/lib/postgresql/data

volumes:
  subscriptionmanager_db_data: